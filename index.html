<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Robotacus</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        secondary: '#1e40af',
                    }
                }
            }
        }
    </script>
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Custom scrollbar for dark theme */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0f172a; 
        }
        ::-webkit-scrollbar-thumb {
            background: #334155; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #475569; 
        }
    </style>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center p-4">

    <!-- Main Container -->
    <div class="bg-slate-800 w-full max-w-lg rounded-2xl shadow-2xl overflow-hidden border border-slate-700">
        
        <!-- Header Section -->
        <div class="bg-gradient-to-r from-blue-700 to-blue-900 p-8 text-center">
            <div class="inline-block p-3 rounded-full bg-white/10 mb-4 backdrop-blur-sm border border-white/10">
                <i class="fas fa-paper-plane text-white text-3xl"></i>
            </div>
            <h1 class="text-3xl font-bold text-white mb-2">Get in Touch</h1>
            <p class="text-blue-200 text-sm">Send a message directly to Robotacus</p>
        </div>

        <!-- Form Section -->
        <div class="p-8">
            <!-- 
                FORM CONFIGURATION
            -->
            <form action="https://formsubmit.co/robotacus@hotmail.com" method="POST" class="space-y-6">
                
                <!-- Configuration for FormSubmit -->
                <input type="hidden" name="_subject" value="New Submission from robotacus.github.io!">
                <input type="hidden" name="_captcha" value="false">
                <input type="hidden" name="_next" value="https://robotacus.github.io/">

                <!-- Message Input -->
                <div>
                    <label for="message" class="block text-sm font-medium text-slate-300 mb-2">Message</label>
                    <textarea name="message" id="message" rows="4" required
                        class="block w-full p-3 bg-slate-900 border border-slate-600 text-white rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors placeholder-transparent focus:outline-none"></textarea>
                </div>

                <!-- Submit Button -->
                <button type="submit" 
                    class="w-full flex justify-center items-center gap-2 bg-blue-600 hover:bg-blue-500 text-white font-semibold py-3 px-4 rounded-lg transition-all duration-200 transform hover:-translate-y-0.5 shadow-lg shadow-blue-900/50">
                    <span>Send</span>
                    <i class="fas fa-arrow-right text-sm"></i>
                </button>
            </form>
        </div>

        <!-- Footer -->
        <div class="bg-slate-900/50 p-4 text-center border-t border-slate-700/50">
            <p class="text-xs text-slate-500">&copy; Robotacus. All rights reserved.</p>
        </div>
    </div>

</body>
</html>
